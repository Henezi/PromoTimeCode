# ============================================================
#                   AntiAbuse Configuration
# ============================================================

# Максимальное количество активаций с одного IP
max-activations-per-ip: 1

# Включить AFK-проверку
enable-afk-check: true

# Секунд без движения = AFK
afk-threshold-seconds: 300 # 300 сек = 5 минут

# Включить IP-лимит
enable-ip-limit: true

# Интервал между AFK-предупреждениями (сек)
afk-warning-cooldown: 30