# ============================================================
#                   PromoTimeCode Config
# ============================================================
# Версия конфига (не меняй, если не знаешь что делаешь)
config-version: 1.0

# ============================================================
#                    ОСНОВНЫЕ НАСТРОЙКИ
# ============================================================
settings:
  # На сколько минут дается донат при выполнении условий
  default-duration-minutes: 60

  # Сколько монет зачисляется на баланс Ютуберу
  default-balance: 50.0

  # Сколько минут надо отыграть игроку для получения награды
  default-playtime-minutes: 120

  # Интервал проверки времени в секундах (10 = каждые 10 секунд)
  check-interval-seconds: 10

  # Как часто сохранять данные в минутах (1 = каждую минуту)
  save-interval-minutes: 1

  # Разрешить создание только 1 кода на ютубера
  one-code-per-youtuber: true

# ============================================================
#                    СООБЩЕНИЯ ДЛЯ ИГРОКОВ
# ============================================================
messages:
  # Префикс плагина
  prefix: "&6[Promo] &r"

  # Общие сообщения
  no-permission: "&cУ вас нет прав на использование этой команды!"
  only-player: "&cЭта команда доступна только игрокам!"
  reloaded: "&aПлагин успешно перезагружен!"

  # Помощь
  help-header: "&6=== PromoTimeCode Help ==="
  help-activate: "Активировать промокод"
  help-progress: "Показать прогресс"
  help-help: "Показать помощь"
  help-create: "Создать промокод"
  help-info: "Информация о вашем коде"
  help-reload: "Перезагрузить плагин"
  help-show: "Информация о коде"
  help-balance: "Изменить баланс"
  help-delete: "Удалить промокод"

  # Создание кода
  code-created: "&aПромокод &e%code% &aуспешно создан!"
  code-created-details:
    - "&7├─ &eГруппа: &f%group% &7на &f%duration% &7мин"
    - "&7├─ &eНаграда ютуберу: &f%reward% &7монет"
    - "&7└─ &eНужно отыграть: &f%playtime% &7минут"
  code-already-exists: "&cПромокод &e%code% &cуже существует!"
  you-already-have-code: "&cУ вас уже есть промокод &e%code%&c!"
  your-code-info: "&eИспользуйте &6/promocode info &eдля просмотра"
  cannot-activate-own-code: "&cВы не можете активировать свой собственный промокод!"
  cannot-activate-own-code-hint: "&eЭто сделано для предотвращения накрутки."

  # Активация кода
  code-activated: "&aВы успешно активировали код &e%code%&a!"
  code-activated-hint: "&7Отыграйте &e%time% &7минут для получения награды"
  already-has-code: "&cВы уже активировали промокод &e%code%&c!"
  already-has-code-hint: "&eВы можете иметь только один активный промокод"

  # Прогресс
  progress-title: "&6=== &eПрогресс по коду &e%code% &6==="
  progress-played: "&eОтыграно: &a%current%&e/%need% &eминут"
  progress-status-waiting: "&eСтатус: &e⏳ Ожидание..."
  progress-status-done: "&eСтатус: &a✅ Награда получена!"
  no-active-code: "&cУ вас нет активного промокода!"

  # Награда
  code-done: "&aПоздравляем! Вы выполнили условия промокода!"
  code-done-details:
    - "&7└─ &eГруппа: &f%group% &7на &f%time% &7мин"

  # Информация о коде (для ютубера)
  info-title: "&6=== &eВаш промокод &e%code% &6==="
  info-group: "&eГруппа: &f%group%"
  info-duration: "&eДлительность: &f%duration% &7мин"
  info-reward: "&eНаграда ютуберу: &f%reward% &7монет"
  info-playtime: "&eНужно отыграть: &f%playtime% &7мин"
  info-players: "&eАктивировали: &f%players% &7игроков"
  info-completed: "&eВыполнили условия: &f%completed% &7игроков"
  info-balance: "&eТекущий баланс: &f%balance% &7монет"
  no-codes-found: "&cУ вас нет созданных промокодов!"

  # Админ команды
  show-title: "&6=== &eИнформация о коде &f%code% &6==="
  show-author: "&eАвтор: &f%author%"
  show-group: "&eГруппа: &f%group%"
  show-duration: "&eДлительность: &f%duration% &7мин"
  show-reward: "&eНаграда ютуберу: &f%reward% &7монет"
  show-playtime: "&eНужно отыграть: &f%playtime% &7мин"
  show-players: "&eАктивировали: &f%players% &7игроков"
  show-completed: "&eВыполнили условия: &f%completed% &7игроков"
  show-balance: "&eБаланс для выплаты: &f%balance% &7монет"
  code-not-found: "&cПромокод &e%code% &cне найден!"

  # Баланс
  balance-added: "&aДобавлено &e%amount% &aк балансу кода &e%code%"
  balance-removed: "&aУбрано &e%amount% &aиз баланса кода &e%code%"
  balance-current: "&7Текущий баланс: &e%balance% &7монет"
  balance-invalid-amount: "&cВведите корректное число!"
  balance-invalid-action: "&cИспользуйте: /promocode balance add/remove <код> <сумма>"

  # Удаление кода
  code-deleted: "&aПромокод &e%code% &aудален!"
  code-delete-error: "&cОшибка при удалении кода!"

# ============================================================
#                    ФОРМАТЫ И ОГРАНИЧЕНИЯ
# ============================================================
formats:
  # Разрешенные символы для кода (регулярное выражение)
  code-pattern: "^[A-Z0-9]{3,20}$"

# ============================================================
#                    ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ
# ============================================================
extra:
  # Сохранять данные игроков при выходе
  save-on-quit: true

  # Логировать действия в консоль
  log-actions: true

  # Группа по умолчанию для новых кодов
  default-group: "VIP"